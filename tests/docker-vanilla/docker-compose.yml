# @author kurst@mnfurs.org Kurst Hyperyote for Furry Migration
# Standalone vanilla WordPress environment for OnlineSched verification.
# Spin up: docker-compose up -d
# Seed: ./seed-vanilla.sh

services:
  onlinesched-vanilla-db:
    image: mariadb:10.11
    container_name: onlinesched-vanilla-db
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_RANDOM_ROOT_PASSWORD: '1'
    networks:
      - onlinesched-vanilla-net

  onlinesched-vanilla-wp:
    image: wordpress:latest
    container_name: onlinesched-vanilla-wp
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: onlinesched-vanilla-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ../..:/var/www/html/wp-content/plugins/OnlineSched:z
    depends_on:
      - onlinesched-vanilla-db
    networks:
      - onlinesched-vanilla-net

  onlinesched-vanilla-cli:
    image: wordpress:cli
    container_name: onlinesched-vanilla-cli
    environment:
      WORDPRESS_DB_HOST: onlinesched-vanilla-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ../..:/var/www/html/wp-content/plugins/OnlineSched:z
    depends_on:
      - onlinesched-vanilla-db
    networks:
      - onlinesched-vanilla-net

volumes:
  wp_data:

networks:
  onlinesched-vanilla-net:
    driver: bridge
